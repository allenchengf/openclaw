# openclaw-Taiwan Cloud Build 設定
# 使用前請將 substitutions 改成你的 GCP 專案與區域

# 提交時可覆寫，例如：
#   --substitutions=_GEMINI_API_KEY=金鑰,_OPENCLAW_GATEWAY_TOKEN=你的gateway_token
# 若未傳 _OPENCLAW_GATEWAY_TOKEN，容器啟動時會自動產生隨機 token（CLI/Dashboard 無法預知）
substitutions:
  _GCP_PROJECT_ID: project-df9933f9-89bc-4f20-9f2
  _GCP_REGION: asia-east1
  _AR_REPO_NAME: clawdbot-repo
  _SERVICE_NAME: clawdbot
  _TAG: v1
  _GEMINI_API_KEY: ''
  _OPENCLAW_GATEWAY_TOKEN: ''

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 讓 Docker 可推送到 Artifact Registry（避免 Step 1 push 失敗）
  - name: 'gcr.io/cloud-builders/gcloud'
    id: docker-auth
    entrypoint: 'bash'
    args:
      - '-c'
      - 'gcloud auth configure-docker ${_GCP_REGION}-docker.pkg.dev --quiet'

  # 建置 Docker 映像
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    waitFor: [docker-auth]
    args:
      - 'build'
      - '-t'
      - '${_GCP_REGION}-docker.pkg.dev/${_GCP_PROJECT_ID}/${_AR_REPO_NAME}/${_SERVICE_NAME}:${_TAG}'
      - '-f'
      - 'Dockerfile.cloudrun'
      - '.'
    dir: '.'

  # 推送到 Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args:
      - 'push'
      - '${_GCP_REGION}-docker.pkg.dev/${_GCP_PROJECT_ID}/${_AR_REPO_NAME}/${_SERVICE_NAME}:${_TAG}'
    waitFor: [build]

  # 部署到 Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_GCP_REGION}-docker.pkg.dev/${_GCP_PROJECT_ID}/${_AR_REPO_NAME}/${_SERVICE_NAME}:${_TAG}'
      - '--region=${_GCP_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--port=8080'
      - '--set-env-vars=GEMINI_API_KEY=${_GEMINI_API_KEY},OPENCLAW_GATEWAY_TOKEN=${_OPENCLAW_GATEWAY_TOKEN}'
      - '--project=${_GCP_PROJECT_ID}'
      - '--timeout=300'
      - '--verbosity=debug'
    waitFor: [push]

images:
  - '${_GCP_REGION}-docker.pkg.dev/${_GCP_PROJECT_ID}/${_AR_REPO_NAME}/${_SERVICE_NAME}:${_TAG}'
